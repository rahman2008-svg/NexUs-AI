<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NexUs AI • Wikipedia Query</title>
</head>

<body>
<script>
/**
 * Wikipedia fetcher (fuzzy + infobox + summary)
 */

async function fetchWikipedia(topic, lang) {
  const base = `https://${lang}.wikipedia.org/w/api.php`;

  try {
    // 🔎 STEP 1: SEARCH + SUMMARY
    const searchUrl = `${base}?` + new URLSearchParams({
      action: "query",
      format: "json",
      generator: "search",
      gsrsearch: topic,
      gsrlimit: "1",
      prop: "extracts",
      exintro: "1",
      explaintext: "1",
      origin: "*"
    });

    const res = await fetch(searchUrl);
    const data = await res.json();

    const pages = data?.query?.pages;
    if (!pages) {
      return { error: `No results found for "${topic}"` };
    }

    const page = Object.values(pages)[0];
    const title = page.title || "Unknown";
    const extract = page.extract || "";

    // 🧠 STEP 2: INFBOX EXTRACTION
    let infobox = "";

    try {
      const parseUrl = `${base}?` + new URLSearchParams({
        action: "parse",
        page: title,
        section: "0",
        prop: "text",
        format: "json",
        origin: "*"
      });

      const pRes = await fetch(parseUrl);
      const pData = await pRes.json();

      const html = pData?.parse?.text?.["*"];

      if (html) {
        const doc = new DOMParser().parseFromString(html, "text/html");
        const box = doc.querySelector("table.infobox");

        if (box) {
          box.querySelectorAll("tr").forEach(tr => {
            const k = tr.querySelector("th");
            const v = tr.querySelector("td");

            if (k && v) {
              const key = k.textContent.replace(/\[\d+\]/g, "").trim();
              const value = v.textContent.replace(/\[\d+\]/g, "").trim();
              infobox += `${key}: ${value}\n`;
            }
          });
        }
      }
    } catch (err) {
      console.warn("Infobox parse failed:", err);
    }

    // 📦 FINAL RESULT
    let result = "";

    if (infobox) {
      result += `📊 INFOBOX\n${infobox}\n`;
    }

    if (extract) {
      result += `📘 SUMMARY\n${extract}`;
    }

    if (!result.trim()) {
      return { error: `Page found (${title}) but no data available.` };
    }

    // ✂️ SAFETY LIMIT
    const LIMIT = lang === "en" ? 5000 : 3000;

    if (result.length > LIMIT) {
      result = result.slice(0, LIMIT) + "\n\n...[TRUNCATED]";
    }

    return { title, result };

  } catch (e) {
    return { error: e.message };
  }
}

// 🚀 MAIN ENTRY
window["ai_edge_gallery_get_result"] = async (data) => {
  try {
    const { topic, lang } = JSON.parse(data || "{}");

    if (!topic) return JSON.stringify({ error: "Missing topic" });
    if (!lang) return JSON.stringify({ error: "Missing language code" });

    const res = await fetchWikipedia(topic, lang);

    return JSON.stringify(res);

  } catch (e) {
    return JSON.stringify({ error: e.message });
  }
};
</script>
</body>
</html>
