<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="X-UA-Compatible" content="ie=edge"/>
  <title>NexUs AI - Text Spinner</title>
</head>

<body>

<script>
/**
 * NexUs AI Text Spinner Skill
 * Returns webview URL with label parameter
 */

window["ai_edge_gallery_get_result"] = async (data) => {
  try {
    const jsonObj = JSON.parse(data || "{}");

    const label = jsonObj.label || "NexUs AI 🚀";
    const encodedLabel = encodeURIComponent(label);

    return JSON.stringify({
      webview: {
        url: `webview.html?label=${encodedLabel}&v=${Date.now()}`
      },
      result: "Spinner loaded successfully"
    });

  } catch (error) {
    return JSON.stringify({
      error: `Failed to load spinner: ${error.message}`
    });
  }
};
</script>

</body>
</html>
