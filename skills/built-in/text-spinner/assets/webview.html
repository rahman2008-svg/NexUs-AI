<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NexUs AI • 3D Face Tracker</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, sans-serif;
    }

    #container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    video, canvas {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    #label {
      position: absolute;
      color: white;
      font-weight: 800;
      padding: 10px 20px;
      border-radius: 40px;
      background: linear-gradient(135deg, #00f2fe, #4facfe);
      display: none;
      pointer-events: none;
      white-space: nowrap;
      transform-style: preserve-3d;
      box-shadow: 0 10px 25px rgba(0,150,255,0.4);
    }

    #status {
      position: fixed;
      top: 15px;
      left: 15px;
      padding: 8px 12px;
      font-size: 13px;
      color: #00f2fe;
      background: rgba(0,0,0,0.6);
      border-radius: 8px;
      z-index: 10;
    }
  </style>
</head>

<body>

<div id="status">Loading AI Engine...</div>

<div id="container">
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>
  <div id="label">NexUs AI</div>
</div>

<script type="module">
import {
  FaceLandmarker,
  FilesetResolver
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs";

const video = document.getElementById("video");
const label = document.getElementById("label");
const status = document.getElementById("status");

let faceLandmarker;
let rotationZ = 0;

const params = new URLSearchParams(location.search);
label.innerText = params.get("label") || "NEXUS AI";

async function init() {
  try {
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm"
    );

    faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath:
          "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
        delegate: "CPU"
      },
      runningMode: "VIDEO",
      numFaces: 1
    });

    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user" }
    });

    video.srcObject = stream;

    video.onloadeddata = () => {
      status.style.display = "none";
      loop();
    };

  } catch (err) {
    status.innerText = "Error: " + err.message;
  }
}

function loop() {
  const results = faceLandmarker.detectForVideo(video, performance.now());

  if (results.faceLandmarks?.length) {
    const lm = results.faceLandmarks[0];

    const top = lm[10];
    const nose = lm[4];
    const left = lm[234];
    const right = lm[454];

    const x = (1 - top.x) * window.innerWidth;
    const y = top.y * window.innerHeight;

    const dx = Math.abs(nose.x - left.x);
    const dy = Math.abs(nose.x - right.x);
    const yaw = ((dx / (dx + dy)) - 0.5) * 2 * -60;

    rotationZ += 3;

    const size = Math.min(70, Math.max(18, Math.abs(right.x - left.x) * 200));

    label.style.display = "block";
    label.style.left = x + "px";
    label.style.top = (y - size) + "px";
    label.style.fontSize = size + "px";
    label.style.transform =
      `translate(-50%, -50%) rotateY(${yaw}deg) rotateZ(${rotationZ}deg)`;
  } else {
    label.style.display = "none";
  }

  requestAnimationFrame(loop);
}

init();
</script>

</body>
</html>
