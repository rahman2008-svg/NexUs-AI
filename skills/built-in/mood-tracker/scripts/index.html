<!DOCTYPE html>
<html lang="en">
<body>
<script>
/* =========================
   CONFIG
========================= */
const STORAGE_KEY = "mood_tracker_data_v1";

/* =========================
   DATE HELPERS
========================= */
function formatDate(d) {
  const year = d.getFullYear();
  const month = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${year}-${month}-${day}`;
}

function resolveDate(inputDate) {
  const now = new Date();

  if (!inputDate || inputDate === "today") return formatDate(now);

  if (inputDate === "yesterday") {
    const d = new Date();
    d.setDate(d.getDate() - 1);
    return formatDate(d);
  }

  if (/^\d{4}-\d{2}-\d{2}$/.test(inputDate)) return inputDate;

  const parsed = new Date(inputDate);
  if (!isNaN(parsed.getTime())) return formatDate(parsed);

  return formatDate(now);
}

/* =========================
   STORAGE HELPERS
========================= */
function loadData() {
  return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

/* =========================
   MAIN HANDLER
========================= */
window["ai_edge_gallery_get_result"] = async (dataStr) => {
  try {
    const input = JSON.parse(dataStr || "{}");
    const action = input.action;
    const data = loadData();

    const date = resolveDate(input.date);

    let result = "";
    let openDashboard = false;

    /* =========================
       LOG MOOD
    ========================= */
    if (action === "log_mood") {
      const score = Number(input.score);

      if (!score || score < 1 || score > 10) {
        throw new Error("Mood must be between 1 and 10");
      }

      data[date] = {
        score,
        comment: input.comment || "",
        updatedAt: new Date().toISOString(),
      };

      saveData(data);

      result = `Mood saved: ${score}/10 on ${date}`;

    /* =========================
       GET MOOD
    ========================= */
    } else if (action === "get_mood") {
      const entry = data[date];

      result = entry
        ? `Mood on ${date}: ${entry.score}/10 ${entry.comment ? `(${entry.comment})` : ""}`
        : `No mood found for ${date}`;

    /* =========================
       HISTORY
    ========================= */
    } else if (action === "get_history") {
      const days = Number(input.days) || 7;

      const sorted = Object.keys(data)
        .sort()
        .slice(-days)
        .map((d) => `- ${d}: ${data[d].score}/10 ${data[d].comment ? `(${data[d].comment})` : ""}`)
        .join("\n");

      result = `Mood History (${days} days):\n${sorted || "No data available"}`;
      openDashboard = true;

    /* =========================
       DELETE
    ========================= */
    } else if (action === "delete_mood") {
      if (data[date]) {
        delete data[date];
        saveData(data);
        result = `Deleted mood for ${date}`;
      } else {
        result = `No entry found for ${date}`;
      }

    /* =========================
       EXPORT
    ========================= */
    } else if (action === "export_data") {
      result = JSON.stringify(data, null, 2);

    /* =========================
       WIPE
    ========================= */
    } else if (action === "wipe_data") {
      localStorage.removeItem(STORAGE_KEY);
      result = "All mood data cleared.";

    } else {
      throw new Error("Unknown action: " + action);
    }

    /* =========================
       RESPONSE
    ========================= */
    const response = { result };

    if (openDashboard) {
      response.webview = {
        url: `dashboard.html?days=${input.days || 7}`
      };
    }

    return JSON.stringify(response);

  } catch (err) {
    return JSON.stringify({
      error: err.message || "Unknown error"
    });
  }
};
</script>
</body>
</html>
