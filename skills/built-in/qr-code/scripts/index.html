<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NexUs AI • QR Generator</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>

  <style>
    body {
      margin: 0;
      background: #0f0f1a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
    }

    #container {
      display: none;
    }

    canvas {
      border-radius: 12px;
    }
  </style>
</head>

<body>

<div id="container"></div>
<canvas id="canvas" width="512" height="512"></canvas>

<script>
window["ai_edge_gallery_get_result"] = async (data) => {
  try {
    const { url, shape = "square" } = JSON.parse(data || "{}");

    if (!url) {
      throw new Error("URL is required");
    }

    const container = document.getElementById("container");
    container.innerHTML = "";

    // 🧠 Generate QR Code
    new QRCode(container, {
      text: url,
      width: 512,
      height: 512,
      correctLevel: QRCode.CorrectLevel.H
    });

    // ⏳ Wait for QR render
    const qrElement = await new Promise((resolve, reject) => {
      let i = 0;

      const interval = setInterval(() => {
        const canvas = container.querySelector("canvas");
        const img = container.querySelector("img");

        if (canvas) {
          clearInterval(interval);
          resolve(canvas);
        }

        if (img && img.complete) {
          clearInterval(interval);
          resolve(img);
        }

        if (++i > 100) {
          clearInterval(interval);
          reject(new Error("QR generation timeout"));
        }
      }, 50);
    });

    // 🎨 Output canvas
    const out = document.getElementById("canvas");
    const ctx = out.getContext("2d");

    ctx.clearRect(0, 0, 512, 512);

    // 🔵 Shape option
    if (shape === "circle") {
      ctx.beginPath();
      ctx.arc(256, 256, 256, 0, Math.PI * 2);
      ctx.clip();
    }

    ctx.drawImage(qrElement, 0, 0, 512, 512);

    const base64 = out.toDataURL("image/png");

    return JSON.stringify({
      result: {
        status: "success",
        message: "QR generated successfully"
      },
      image: {
        base64
      }
    });

  } catch (err) {
    return JSON.stringify({
      error: err.message,
      result: null,
      image: null
    });
  }
};
</script>

</body>
</html>
