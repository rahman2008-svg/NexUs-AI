<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexUs AI - Interactive Map</title>
</head>

<body>

<script>
window['ai_edge_gallery_get_result'] = async (data) => {
  try {
    const jsonData = JSON.parse(data || "{}");

    if (!jsonData.location || typeof jsonData.location !== "string") {
      throw new Error("Invalid or missing 'location' parameter");
    }

    const location = jsonData.location.trim();

    if (location.length === 0) {
      throw new Error("Location cannot be empty");
    }

    const encodedLocation = encodeURIComponent(location);

    return JSON.stringify({
      webview: {
        iframe: true,
        url: `https://maps.google.com/maps?q=${encodedLocation}&output=embed`
      }
    });

  } catch (e) {
    console.error("Map Error:", e);

    return JSON.stringify({
      error: `Failed to load map for location: ${e.message}`
    });
  }
};
</script>

</body>
</html>
