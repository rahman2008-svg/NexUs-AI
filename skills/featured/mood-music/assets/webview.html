<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mood Music Player | NexUs AI</title>

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      font-family: "Outfit", sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
    }

    .player {
      width: 380px;
      padding: 30px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      text-align: center;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
    }

    h1 {
      font-size: 22px;
      margin-bottom: 6px;
    }

    p {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 20px;
    }

    .art {
      width: 220px;
      height: 220px;
      margin: 0 auto 20px;
      border-radius: 20px;
      background: linear-gradient(45deg, #ff3366, #6600ff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      50% { transform: scale(1.05); }
    }

    .wave {
      display: flex;
      justify-content: center;
      gap: 4px;
      margin-bottom: 15px;
    }

    .wave div {
      width: 4px;
      height: 10px;
      background: rgba(255,255,255,0.3);
      border-radius: 2px;
    }

    .playing .wave div {
      background: #ff3366;
      animation: bounce 1s infinite ease-in-out;
    }

    @keyframes bounce {
      50% { height: 25px; }
    }

    .btn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: none;
      background: #fff;
      cursor: pointer;
      font-size: 20px;
      font-weight: bold;
    }

    .progress {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      margin: 20px 0 10px;
      cursor: pointer;
    }

    .fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(to right, #ff3366, #6600ff);
    }

    .time {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>

<body>

  <div class="player" id="player">

    <h1 id="title">Mood Track</h1>
    <p id="status">Loading...</p>

    <div class="art">🎧</div>

    <div class="wave">
      <div></div><div></div><div></div><div></div><div></div>
    </div>

    <div class="progress" id="bar">
      <div class="fill" id="fill"></div>
    </div>

    <div class="time">
      <span id="cur">0:00</span>
      <span id="dur">0:00</span>
    </div>

    <br>

    <button class="btn" id="btn">▶</button>

  </div>

  <audio id="audio"></audio>

<script>
  const params = new URLSearchParams(location.search);
  const url = params.get("url");
  const genre = params.get("genre") || "Mood";

  const audio = document.getElementById("audio");
  const player = document.getElementById("player");

  const title = document.getElementById("title");
  const status = document.getElementById("status");

  const btn = document.getElementById("btn");

  const fill = document.getElementById("fill");
  const bar = document.getElementById("bar");

  const cur = document.getElementById("cur");
  const dur = document.getElementById("dur");

  title.textContent = `Vibe: ${genre}`;

  audio.src = url || "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3";

  btn.onclick = async () => {
    if (audio.paused) {
      await audio.play();
      player.classList.add("playing");
      btn.textContent = "⏸";
      status.textContent = "Playing";
    } else {
      audio.pause();
      player.classList.remove("playing");
      btn.textContent = "▶";
      status.textContent = "Paused";
    }
  };

  audio.ontimeupdate = () => {
    fill.style.width = (audio.currentTime / audio.duration) * 100 + "%";
    cur.textContent = format(audio.currentTime);
  };

  audio.onloadedmetadata = () => {
    dur.textContent = format(audio.duration);
  };

  bar.onclick = (e) => {
    const rect = bar.getBoundingClientRect();
    audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
  };

  function format(t){
    if(!t) return "0:00";
    const m = Math.floor(t/60);
    const s = Math.floor(t%60);
    return `${m}:${s<10?"0":""}${s}`;
  }
</script>

</body>
</html>
