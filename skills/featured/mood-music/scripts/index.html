<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mood Music Engine | NexUs AI</title>
  </head>

  <body>

    <script>
      window["ai_edge_gallery_get_result"] = async (data, secret) => {
        try {
          const jsonData = JSON.parse(data || "{}");

          // 🎧 Validated by LLM step
          const genre = jsonData.genre || "House";
          const duration = jsonData.duration || 120;

          let energy = jsonData.energy || "high";
          if (!["low", "high", "original"].includes(energy)) {
            energy = "original";
          }

          // 🔑 API KEY
          const apiKey = secret || "YOUR_API_KEY_HERE";

          if (apiKey === "YOUR_API_KEY_HERE") {
            console.warn("⚠️ Missing Loudly API Key - request may fail.");
          }

          // 📦 Request payload
          const formData = new FormData();
          formData.append("genre", genre);
          formData.append("duration", duration);
          formData.append("energy", energy);

          // 🎼 Loudly API call
          const response = await fetch(
            "https://soundtracks.loudly.com/api/ai/songs",
            {
              method: "POST",
              headers: {
                "API-KEY": apiKey,
                Accept: "application/json",
              },
              body: formData,
            }
          );

          if (!response.ok) {
            const errorText = await response.text();
            throw new Error(
              `Loudly API Error ${response.status}: ${errorText}`
            );
          }

          const songData = await response.json();

          const audioUrl = songData.music_file_path || "";
          const songTitle = songData.title || "NexUs AI Track";

          // 🚀 Return WebView
          return JSON.stringify({
            webview: {
              url:
                `webview.html?url=${encodeURIComponent(audioUrl)}` +
                `&duration=${duration}` +
                `&genre=${encodeURIComponent(genre)}` +
                `&title=${encodeURIComponent(songTitle)}`,
            },
          });

        } catch (e) {
          console.error("Mood Music Engine Error:", e);

          return JSON.stringify({
            error: `Music generation failed: ${e.message}`,
          });
        }
      };
    </script>

    <!-- 🧪 Test Panel -->
    <div
      style="
        margin: 20px;
        padding: 20px;
        border: 1px solid #333;
        background: #111;
        font-family: sans-serif;
        color: #fff;
        border-radius: 10px;
      "
    >
      <h3>🎧 NexUs AI Mood Music Test Panel</h3>

      <button
        id="run-test"
        style="
          padding: 10px 20px;
          font-size: 16px;
          cursor: pointer;
          border-radius: 8px;
        "
      >
        ▶ Run Music Generation Test
      </button>

      <pre
        id="test-output"
        style="
          margin-top: 15px;
          padding: 10px;
          background: #222;
          border-radius: 8px;
          white-space: pre-wrap;
          font-size: 13px;
        "
      ></pre>
    </div>

    <script>
      document.getElementById("run-test").addEventListener("click", async () => {
        const output = document.getElementById("test-output");
        output.textContent = "Generating music...";

        try {
          const mockPayload = JSON.stringify({
            genre: "Lo Fi",
            energy: "original",
            duration: 240,
          });

          const result =
            await window["ai_edge_gallery_get_result"](mockPayload);

          output.textContent = result;
        } catch (e) {
          output.textContent = `Error: ${e.message}`;
        }
      });
    </script>

  </body>
</html>
