<script>
  window["ai_edge_gallery_get_result"] = async (data, secret) => {
    try {
      const apiKey = secret || "YOUR_API_KEY_HERE";

      if (apiKey === "YOUR_API_KEY_HERE") {
        console.warn("⚠️ Missing API key - Loudly request may fail.");
      }

      // 🎼 Fetch available genres from Loudly
      const response = await fetch(
        "https://soundtracks.loudly.com/api/ai/genres",
        {
          method: "GET",
          headers: {
            "API-KEY": apiKey,
            Accept: "application/json",
          },
        }
      );

      if (!response.ok) {
        const errorText = await response.text();
        throw new Error(
          `Loudly Genres API Error ${response.status}: ${errorText}`
        );
      }

      const genres = await response.json();

      // 🧠 Normalize genre structure for LLM
      const mappedGenres = (genres || []).map((g) => ({
        name: g.name,
        description: g.description || "",
      }));

      // 🚀 Return to LLM for next step decision
      return JSON.stringify({
        available_genres: mappedGenres,
      });

    } catch (e) {
      console.error("Genre Fetch Error:", e);

      return JSON.stringify({
        error: "Failed to fetch available music genres.",
        details: e.message,
      });
    }
  };
      </script>
