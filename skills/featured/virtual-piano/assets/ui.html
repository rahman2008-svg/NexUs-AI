<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <title>88-Key Virtual Piano | NexUs AI</title>

  <style>
    body {
      margin: 0;
      background: #1e1e2f;
      display: flex;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    /* Scroll container */
    #piano-scroll-container {
      width: 100%;
      overflow-x: auto;
      white-space: nowrap;
      padding: 20px;
      touch-action: pan-x;

      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    #piano-scroll-container::-webkit-scrollbar {
      display: none;
    }

    /* Piano wrapper */
    #piano {
      display: inline-flex;
      flex-direction: column;
      background: #222;
      padding: 10px 10px 0;
      border-radius: 12px;

      box-shadow:
        0 10px 30px rgba(0, 0, 0, 0.8),
        inset 0 2px 5px rgba(255, 255, 255, 0.1);
    }

    #key-container {
      display: flex;
      position: relative;
    }

    /* Key group */
    .key-group {
      position: relative;
      width: 60px;
      flex-shrink: 0;
    }

    /* Scroll hint */
    #scroll-lip {
      height: 60px;
      background: linear-gradient(to bottom, #333, #1a1a1a);
      border-top: 2px solid #111;
      border-radius: 0 0 10px 10px;
      margin: 0 -10px;

      display: flex;
      align-items: center;
      justify-content: center;

      color: #777;
      font-family: sans-serif;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 3px;
      user-select: none;

      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.5);
    }

    /* WHITE KEYS */
    .key.white {
      width: 100%;
      height: 250px;
      background: linear-gradient(to bottom, #fff 80%, #f0f0f0);
      border-right: 1px solid #ccc;
      border-bottom: 2px solid #bbb;
      border-radius: 0 0 6px 6px;

      display: flex;
      align-items: flex-end;
      justify-content: center;

      padding-bottom: 15px;

      font-family: sans-serif;
      font-size: 13px;
      font-weight: bold;
      color: #999;

      cursor: pointer;
      user-select: none;
      position: relative;
      z-index: 1;

      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 4px 5px rgba(0, 0, 0, 0.2);
    }

    .key-group:first-child .key.white {
      border-left: 1px solid #ccc;
    }

    .key.white:active,
    .key.white.active {
      background: #e0e0e0;
      color: #333;
      box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.4);
    }

    /* BLACK KEYS */
    .key.black {
      width: 30px;
      height: 140px;
      background: linear-gradient(to bottom, #444, #000);

      position: absolute;
      top: 0;
      right: -15px;
      z-index: 10;

      border-radius: 0 0 5px 5px;
      border: 1px solid #111;
      border-bottom: 3px solid #000;

      cursor: pointer;
      box-shadow: 2px 4px 6px rgba(0, 0, 0, 0.5);

      -webkit-tap-highlight-color: transparent;
    }

    .key.black:active,
    .key.black.active {
      background: #111;
      box-shadow: inset 0 3px 6px rgba(0, 0, 0, 0.9);
    }
  </style>
</head>

<body>

  <div id="piano-scroll-container">
    <div id="piano">
      <div id="key-container"></div>
      <div id="scroll-lip">⟷ SLIDE TO SCROLL ⟷</div>
    </div>
  </div>

  <script>
    const keyContainer = document.getElementById("key-container");

    const NOTES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

    let noteNumber = 1;

    /* -------------------------
       1. GENERATE KEYS
    ------------------------- */
    while (noteNumber <= 88) {
      const group = document.createElement("div");
      group.className = "key-group";

      const offset = (noteNumber + 8) % 12;
      const noteName = NOTES[offset];
      const octave = Math.floor((noteNumber + 8) / 12);

      // WHITE KEY
      const whiteKey = document.createElement("div");
      whiteKey.className = "key white";
      whiteKey.dataset.note = noteNumber;
      whiteKey.innerText = noteName + octave;

      group.appendChild(whiteKey);

      // BLACK KEY (if valid)
      if (offset !== 4 && offset !== 11 && noteNumber !== 88) {
        noteNumber++;

        const blackKey = document.createElement("div");
        blackKey.className = "key black";
        blackKey.dataset.note = noteNumber;

        group.appendChild(blackKey);
      }

      keyContainer.appendChild(group);
      noteNumber++;
    }

    /* -------------------------
       2. AUDIO ENGINE
    ------------------------- */
    const audioNotes = {};

    for (let i = 1; i <= 88; i++) {
      audioNotes[i] = new Audio(`assets/${i}.mp3`);
    }

    const keys = document.querySelectorAll(".key");

    keys.forEach((key) => {
      const playSound = () => {
        const note = key.dataset.note;
        const audio = audioNotes[note];

        if (!audio) return;

        audio.currentTime = 0;
        audio.play().catch(() => {});

        key.classList.add("active");

        setTimeout(() => {
          audio.pause();
          audio.currentTime = 0;
        }, 2000);
      };

      key.addEventListener("pointerdown", (e) => {
        e.stopPropagation();
        playSound();
      });

      ["pointerup", "pointerleave", "pointercancel"].forEach(evt => {
        key.addEventListener(evt, () => key.classList.remove("active"));
      });
    });

    /* -------------------------
       3. CENTER MIDDLE C
    ------------------------- */
    setTimeout(() => {
      const middleC = document.querySelector('.key.white[data-note="40"]');

      if (middleC) {
        middleC.scrollIntoView({
          behavior: "auto",
          inline: "center",
          block: "nearest"
        });
      }
    }, 100);
  </script>

</body>
</html>
