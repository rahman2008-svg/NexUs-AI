<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <title>Restaurant Roulette Wheel | NexUs AI</title>

  <style>
    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1e1e2f;
      color: #fff;
      font-family: sans-serif;
      overflow: hidden;
      box-sizing: border-box;
    }

    h2 {
      margin: 0 0 20px;
      font-size: 20px;
      text-align: center;
      padding: 0 15px;
    }

    p.subtitle {
      margin: 0 0 20px;
      font-size: 14px;
      color: #aaa;
    }

    /* Wheel container */
    #wheel-container {
      position: relative;
      width: 240px;
      height: 240px;
      margin-bottom: 30px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    canvas {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 8px 15px rgba(0, 0, 0, 0.5));
    }

    /* Pointer */
    #pointer {
      position: absolute;
      top: -15px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 12px solid transparent;
      border-right: 12px solid transparent;
      border-top: 24px solid #ff4757;
      z-index: 10;
      pointer-events: none;
    }

    /* Spin button */
    #spin-btn {
      background: #ff4757;
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(255, 71, 87, 0.4);
    }

    #spin-btn:active {
      transform: scale(0.95);
    }

    #spin-btn:disabled {
      background: #555;
      box-shadow: none;
      cursor: not-allowed;
    }

    /* Winner modal */
    #winner-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      backdrop-filter: blur(5px);
      padding: 20px;
    }

    #winner-title {
      font-size: 28px;
      color: #2ed573;
      margin-bottom: 10px;
    }

    #winner-name {
      font-size: 34px;
      font-weight: bold;
      text-transform: uppercase;
      margin-bottom: 30px;
    }

    #close-modal {
      background: #fff;
      color: #1e1e2f;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h2 id="title">Loading roulette...</h2>

  <div id="wheel-container">
    <div id="pointer"></div>
    <canvas id="wheelCanvas" width="600" height="600"></canvas>
  </div>

  <button id="spin-btn">SPIN ROULETTE</button>

  <div id="winner-overlay">
    <div id="winner-title">🎉 WINNER 🎉</div>
    <div id="winner-name">Restaurant</div>
    <button id="close-modal">Spin Again</button>
  </div>

<script>
  const params = new URLSearchParams(window.location.search);
  const cuisine = params.get("c") || "Food";
  const locationStr = params.get("l") || "Nearby";

  let places = [];

  try {
    const data = params.get("data");
    if (data) {
      const decoded = decodeURIComponent(escape(atob(data)));
      places = decoded.split("|");
    }
  } catch (e) {
    places = ["Error Loading Data"];
  }

  if (!places.length) places = ["No Results"];

  document.getElementById("title").innerText =
    `${cuisine} in ${locationStr}`;

  const canvas = document.getElementById("wheelCanvas");
  const ctx = canvas.getContext("2d");

  const cx = 300, cy = 300, radius = 280;
  const N = places.length;
  const arc = (2 * Math.PI) / N;

  let angle = 0;
  let spinning = false;

  const colors = ["#ff4757","#ffa502","#2ed573","#1e90ff","#3742fa","#ff6348"];

  function draw() {
    ctx.clearRect(0,0,600,600);
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle);

    for (let i = 0; i < N; i++) {
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.arc(0,0,radius,i*arc,(i+1)*arc);
      ctx.fillStyle = colors[i % colors.length];
      ctx.fill();
      ctx.strokeStyle = "#1e1e2f";
      ctx.stroke();

      ctx.save();
      ctx.rotate(i*arc + arc/2);
      ctx.fillStyle = "#fff";
      ctx.font = "bold 22px sans-serif";
      ctx.textAlign = "right";
      ctx.textBaseline = "middle";

      let text = places[i] || "";
      if (text.length > 14) text = text.slice(0,12)+"...";

      ctx.fillText(text, radius-20, 0);
      ctx.restore();
    }

    // center
    ctx.beginPath();
    ctx.arc(0,0,40,0,Math.PI*2);
    ctx.fillStyle = "#fff";
    ctx.fill();

    ctx.restore();
  }

  draw();

  function spin() {
    if (spinning) return;
    spinning = true;

    const btn = document.getElementById("spin-btn");
    btn.disabled = true;
    btn.innerText = "SPINNING...";

    let velocity = Math.random()*0.2 + 0.35;

    function animate() {
      angle += velocity;
      velocity *= 0.985;
      draw();

      if (velocity < 0.002) {
        spinning = false;

        let p = (-Math.PI/2 - angle) % (Math.PI*2);
        if (p < 0) p += Math.PI*2;

        const index = Math.floor(p / arc);
        const winner = places[index];

        document.getElementById("winner-name").innerText = winner;
        document.getElementById("winner-overlay").style.display = "flex";

        btn.innerText = "SPIN ROULETTE";
        btn.disabled = false;
      } else {
        requestAnimationFrame(animate);
      }
    }

    animate();
  }

  document.getElementById("spin-btn").onclick = spin;
  document.getElementById("wheel-container").onclick = spin;

  document.getElementById("close-modal").onclick = () => {
    document.getElementById("winner-overlay").style.display = "none";
  };
</script>

</body>
</html>
