<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

  <title>Restaurant Roulette Preview | NexUs AI</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      background: #1e1e2f;
      color: white;
      font-family: sans-serif;

      text-align: center;
      user-select: none;
      -webkit-tap-highlight-color: transparent;

      cursor: pointer;
      padding: 20px;
      box-sizing: border-box;
    }

    .icon {
      font-size: 52px;
      margin-bottom: 12px;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 20px;
      color: #2ed573;
    }

    p {
      margin: 0;
      font-size: 14px;
      color: #aaa;
    }

    .btn {
      margin-top: 18px;
      background: #ff4757;
      padding: 12px 26px;
      border-radius: 25px;
      font-weight: bold;
      font-size: 16px;
      box-shadow: 0 4px 10px rgba(255,71,87,0.4);
      display: inline-block;
    }

    .btn:active {
      transform: scale(0.95);
    }
  </style>
</head>

<body>

  <div class="icon">🎰</div>

  <h2 id="title">Loading...</h2>

  <p>Tap anywhere to open the roulette wheel</p>

  <div class="btn">SPIN NOW</div>

<script>
  /* -------------------------
     1. Read URL params
  ------------------------- */
  const params = new URLSearchParams(window.location.search);

  const cuisine = params.get("c") || "Food";
  const locationStr = params.get("l") || "Nearby";
  const data = params.get("data") || "";

  document.getElementById("title").innerText =
    `${cuisine} spots ready!`;

  /* -------------------------
     2. Build target URL
  ------------------------- */
  const uiUrl =
    `ui.html?c=${encodeURIComponent(cuisine)}&l=${encodeURIComponent(locationStr)}&data=${encodeURIComponent(data)}`;

  /* -------------------------
     3. Redirect handler
  ------------------------- */
  function openWheel(e) {
    e.preventDefault();
    window.location.href = uiUrl;
  }

  /* -------------------------
     4. Attach events
  ------------------------- */
  document.body.addEventListener("click", openWheel);
  document.body.addEventListener("touchstart", openWheel);
</script>

</body>
</html>
