<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Restaurant Roulette | NexUs AI</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #121212;
      color: #fff;

      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      padding: 20px;
    }

    .title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 20px;
    }

    .loading {
      width: 40px;
      height: 40px;
      border: 4px solid #333;
      border-top: 4px solid #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="title">🍽️ Restaurant Roulette</div>
    <div class="subtitle">Loading your personalized restaurant wheel...</div>
    <div class="loading"></div>
  </div>

  <!-- Skill logic loader -->
  <script src="index.js"></script>

</body>
</html>
