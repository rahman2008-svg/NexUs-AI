workflows:
  android-build:
    name: Android APK Build
    max_build_duration: 60
    environment:
      java: 17

    scripts:
      - name: Change directory
        script: cd Android/src

      - name: Make gradlew executable
        script: chmod +x gradlew

      - name: Build APK
        script: ./gradlew assembleDebug

    artifacts:
      - app/build/outputs/apk/debug/*.apk
